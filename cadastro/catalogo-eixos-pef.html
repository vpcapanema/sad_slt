<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eixos PEF-SP 2050</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/app.css">
</head>
<body class="ref-page">
  <header class="app-header">
    <div class="app-header-inner">
      <div class="app-brand">
        Eixos PEF-SP
        <small>Guia para classificar no plano ferroviário</small>
      </div>
      <nav class="app-nav" aria-label="Navegação principal"></nav>
    </div>
  </header>
  <main class="app-main ref-main">
    <section class="card ref-alert ref-card">
      <div class="pli-section-label">
        <i class="fas fa-circle-info" aria-hidden="true"></i>
        <span class="pli-section-title">Como escolher o eixo</span>
      </div>
      <div class="ref-card-body">
        <p class="step-intro">Leia a descrição de cada eixo e, se necessário, indique o corredor TIC correspondente.</p>
      </div>
    </section>
    <div id="conteudo"></div>
  </main>
  <script src="referencia-render.js"></script>
  <script>
    SLTReferencia.loadReferencia("../").then(() => {
      SLTReferencia.renderEixosPage(document.getElementById("conteudo"));
      const hash = location.hash.replace("#", "");
      if (hash) document.getElementById(hash)?.scrollIntoView({ behavior: "smooth" });
    });
  </script>
  <script src="../assets/js/app-header.js"></script>
  <script src="../assets/js/navbar.js"></script>
</body>
</html>
