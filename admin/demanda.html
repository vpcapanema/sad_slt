<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demanda — Admin SLT</title>
  <link rel="stylesheet" href="../assets/css/app.css">
  <link rel="stylesheet" href="../assets/css/admin-demanda-page.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
</head>
<body class="admin-data-page admin-dashboard-page layout-with-sidebar page-admin-demanda">
  <div class="layout-with-sidebar-grid">
    <header class="layout-sidebar-header">
      <div class="layout-sidebar-header-inner">
        <a href="../index.html" class="layout-sidebar-home-link" title="Página inicial">
          <img
            src="../assets/img/slt-icon.svg"
            alt=""
            class="sidebar-app-icon"
            width="36"
            height="36"
          >
          <div class="app-brand">
            Apoio à Tomada de Decisão
            <small>Análise de demanda</small>
          </div>
        </a>
      </div>
    </header>

    <header class="app-header layout-main-header">
      <div class="app-header-inner app-header-inner--nav-only">
        <nav class="app-nav">
          <a href="../index.html">Início</a>
          <a href="../cadastro/">Cadastro</a>
          <a href="../ahp/">AHP</a>
          <a href="../painel/">Painel</a>
          <a href="./" class="active">Admin</a>
        </nav>
      </div>
    </header>

    <aside class="layout-sidebar admin-dashboard-sidebar" aria-label="Demandas">
      <div class="layout-sidebar-body">
        <div class="nav-section painel-layers-section admin-section-nav">
          <nav class="sidebar-restricted-nav" aria-label="Área restrita">
            <a href="index.html">Admin</a>
            <a href="painel.html">Painel gestor</a>
            <a href="demandas.html" class="is-active" aria-current="page">Demandas</a>
            <a href="objetos.html">Objetos AHP</a>
          </nav>
          <div id="records-root" class="layer-group layer-group--root">
            <button
              type="button"
              class="layer-group-header layer-group-header--section"
              id="toggle-records-root"
              aria-expanded="true"
              aria-controls="records-list"
            >
              <span class="layer-group-toggle" aria-hidden="true">▼</span>
              <span class="layer-group-name">Demanda</span>
              <span id="records-count" class="layer-group-active-count"></span>
            </button>
            <div id="records-list" class="layer-group-body layers-container admin-records-list"></div>
          </div>
        </div>
      </div>
      <footer class="layout-sidebar-footer">
        Desenvolvido e implementado por
        <strong>VPC-Geotecnologias e Websistemas</strong>
      </footer>
    </aside>

    <div class="layout-main">
      <div id="admin-session-bar" class="admin-session-bar hidden" aria-label="Usuário conectado"></div>

      <main class="admin-dashboard-content layout-main-scroll" id="dashboard-content">
        <p class="hint">Carregando demanda…</p>
      </main>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="../assets/js/admin-api.js"></script>
  <script src="../assets/js/admin-auth.js"></script>
  <script src="../assets/js/sigma-read.js"></script>
  <script src="../assets/js/catalog.js"></script>
  <script src="../assets/js/admin-labels.js"></script>
  <script src="../assets/js/admin-ui.js"></script>
  <script src="../assets/js/admin-dashboard.js"></script>
  <script src="../assets/js/admin-analysis-info.js"></script>
  <script src="../assets/js/admin-analysis-map.js"></script>
  <script src="demanda.js"></script>
</body>
</html>
