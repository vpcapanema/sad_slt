<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demandas — Admin SLT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/app.css">
</head>
<body class="admin-data-page">
  <header class="app-header">
    <div class="app-header-inner">
      <div class="app-brand">
        Apoio à Tomada de Decisão
        <small>Admin — Demandas</small>
      </div>
      <nav class="app-nav" aria-label="Navegação principal"></nav>
    </div>
  </header>

  <div id="admin-session-bar" class="admin-session-bar hidden" aria-label="Usuário conectado"></div>

  <main class="app-main admin-main">
    <section class="card admin-card">
      <div class="pli-section-label">
        <i class="fas fa-table-list" aria-hidden="true"></i>
        <span class="pli-section-title">Demandas cadastradas</span>
      </div>
      <div class="admin-card-body">
        <p class="step-intro">Selecione o tipo de demanda e clique em uma linha para abrir a análise detalhada.</p>

        <div class="admin-tabs" id="tipo-tabs" role="tablist" aria-label="Tipo de demanda">
          <button type="button" class="admin-tab" data-tipo="plano" role="tab" aria-selected="false">Plano</button>
          <button type="button" class="admin-tab" data-tipo="programa" role="tab" aria-selected="false">Programa</button>
          <button type="button" class="admin-tab is-active" data-tipo="projeto" role="tab" aria-selected="true">Projeto</button>
        </div>

        <div class="admin-toolbar">
          <div class="form-field">
            <label for="filtro-status">Status</label>
            <select id="filtro-status">
              <option value="">Todos</option>
            </select>
          </div>
          <div class="form-field admin-toolbar-search">
            <label for="filtro-busca">Buscar</label>
            <input type="text" id="filtro-busca" placeholder="Nome, código ou instituição…" autocomplete="off">
          </div>
          <a href="index.html" class="btn btn-secondary admin-toolbar-back">Voltar</a>
        </div>

        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr id="tabela-head"></tr>
            </thead>
            <tbody id="tabela-demandas"></tbody>
          </table>
        </div>
        <p id="lista-vazia" class="hint hidden">Nenhuma demanda encontrada.</p>
      </div>
    </section>
  </main>

  <script src="../assets/js/admin-api.js"></script>
  <script src="../assets/js/admin-auth.js"></script>
  <script src="../assets/js/sigma-read.js"></script>
  <script src="../assets/js/catalog.js"></script>
  <script src="../assets/js/admin-labels.js"></script>
  <script src="../assets/js/admin-ui.js"></script>
  <script src="demandas.js"></script>
  <script src="../assets/js/app-header.js"></script>
  <script src="../assets/js/navbar.js"></script>
</body>
</html>
