<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demandas — Admin SLT</title>
  <link rel="stylesheet" href="../assets/css/app.css">
</head>
<body class="admin-data-page">
  <header class="app-header">
    <div class="app-header-inner">
      <div class="app-brand">
        Apoio à Tomada de Decisão
        <small>Admin — Demandas</small>
      </div>
      <nav class="app-nav" aria-label="Navegação principal"></nav>
    </div>
  </header>

  <div id="admin-session-bar" class="admin-session-bar hidden" aria-label="Usuário conectado"></div>

  <main class="app-main admin-main">
    <section class="card">
      <h2>Demandas cadastradas</h2>
      <p class="step-intro">Clique em uma linha para abrir a página de análise com navegação por seções.</p>

      <div class="admin-toolbar">
        <div class="form-field">
          <label for="filtro-status">Status</label>
          <select id="filtro-status">
            <option value="">Todos</option>
          </select>
        </div>
        <div class="form-field" style="flex: 1; min-width: 220px;">
          <label for="filtro-busca">Buscar</label>
          <input type="text" id="filtro-busca" placeholder="Nome, código ou instituição…" autocomplete="off">
        </div>
        <a href="index.html" class="btn btn-secondary" style="align-self: flex-end;">Voltar</a>
      </div>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Código</th>
              <th>Projeto</th>
              <th>Instituição</th>
              <th>Plano</th>
              <th>Classificação</th>
              <th>Status</th>
              <th>Cadastro</th>
            </tr>
          </thead>
          <tbody id="tabela-demandas"></tbody>
        </table>
      </div>
      <p id="lista-vazia" class="hint hidden">Nenhuma demanda encontrada.</p>
    </section>
  </main>

  <script src="../assets/js/admin-api.js"></script>
  <script src="../assets/js/admin-auth.js"></script>
  <script src="../assets/js/sigma-read.js"></script>
  <script src="../assets/js/catalog.js"></script>
  <script src="../assets/js/admin-labels.js"></script>
  <script src="../assets/js/admin-ui.js"></script>
  <script src="demandas.js"></script>
  <script src="../assets/js/app-header.js"></script>
  <script src="../assets/js/navbar.js"></script>
</body>
</html>
