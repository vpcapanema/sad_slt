# SLT — PostgreSQL + PostGIS (container dedicado, separado do SIGMA-PLI)
#
# Subir:
#   docker compose up -d
#
# Porta externa: 5434  (interna: 5432)
# Container:     slt_postgres
# Banco:         slt_db
# Usuário:        slt_user / slt_pass  (somente dev local — altere em produção)

services:
  slt_postgres:
    image: postgis/postgis:17-3.5
    container_name: slt_postgres
    restart: unless-stopped

    ports:
      - "5434:5432"

    environment:
      POSTGRES_USER: slt_user
      POSTGRES_PASSWORD: slt_pass
      POSTGRES_DB: slt_db
      TZ: America/Sao_Paulo

    volumes:
      - slt_pgdata:/var/lib/postgresql/data
      - ./database/002_schema_cadastro_auditoria.sql:/docker-entrypoint-initdb.d/02_schema.sql:ro
      - ./database/003_schema_ahp_objetos.sql:/docker-entrypoint-initdb.d/03_schema_ahp.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slt_user -d slt_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  slt_pgdata:
    driver: local
